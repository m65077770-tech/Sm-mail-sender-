<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SM Mail Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="glass-panel animate-in">
        <h1 class="title">SM Mail Hub</h1>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 20px; font-size: 14px;">Premium Email Communication</p>
        
        <form action="/dashboard" method="GET">
            <div class="input-group">
                <input type="email" class="input-box" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" class="input-box" placeholder="Password" required>
            </div>
            
            <div style="display: flex; align-items: center; margin-bottom: 20px; font-size: 13px;">
                <input type="checkbox" style="width: 15px; margin-right: 8px;">
                <label>Remember Me</label>
            </div>

            <button type="submit" class="btn-main">Login to Dashboard</button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 12px; color: #64748b;">
            Secure Connection via SSL
        </p>
    </div>

</body>
</html>
