<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - SM Mail Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <div class="header">
            <a href="/dashboard" style="color: white; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Back</a>
            <div class="logo" style="font-size: 1.2rem;">Email History</div>
        </div>

        <!-- History List -->
        <div id="historyList">
            <!-- Example Item -->
            <div class="glass-panel" style="margin-bottom: 15px; padding: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: var(--accent); font-weight: bold;">To: friend@gmail.com</span>
                    <span style="font-size: 10px; color: #64748b;">10:30 AM</span>
                </div>
                <p style="font-size: 13px; margin-top: 5px; color: #94a3b8;">Subject: Hello from SM Mail</p>
                <div style="margin-top: 10px; font-size: 11px; color: #22c55e;">● Sent Successfully</div>
            </div>
        </div>
    </div>

</body>
</html>
